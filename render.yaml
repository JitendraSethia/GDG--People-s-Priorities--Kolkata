services:
  - type: web
    name: peoples-priorities
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/seed_db.py --reset && gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: GEMINI_API_KEY
        sync: false
      - key: MAPS_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OFFICIAL_PASSCODE
        value: kolkata2026
